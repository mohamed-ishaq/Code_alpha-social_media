version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: devlink-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: devlink

  app:
    build: ./backend
    container_name: devlink-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/devlink
      JWT_SECRET: change-this-to-a-secure-random-256-bit-string-in-production
      JWT_EXPIRE: 7d
      CLIENT_URL: http://localhost:5000
    depends_on:
      - mongodb
    volumes:
      - ./frontend/public:/app/../frontend/public

volumes:
  mongo_data:
