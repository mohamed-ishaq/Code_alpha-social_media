<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevLink — Share Photos & Moments</title>
  <meta name="description" content="Share photos, moments, and vibes. Follow friends and discover what's trending." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/animations.css" />
</head>
<body>
  <!-- Noise overlay -->
  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- App Shell -->
  <div id="app">

    <!-- NAVBAR -->
    <nav class="navbar" id="navbar">
      <div class="nav-inner">
        <a href="/" class="nav-logo" data-link>
          <span class="logo-icon">⬡</span>
          <span class="logo-text">DevLink</span>
        </a>

        <div class="nav-links" id="nav-links">
          <a class="nav-link" href="/#discover" data-link>Discover</a>
          <a class="nav-link" href="/#meetup" data-link>Meetup</a>
          <a class="nav-link" href="/explore" data-link>Search</a>
        </div>

        <div class="nav-search-wrap">
          <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="global-search" placeholder="Search people..." autocomplete="off" />
            <div class="search-dropdown" id="search-dropdown"></div>
          </div>
        </div>

        <div class="nav-actions">
          <a class="btn-primary btn-sm nav-contact-btn" href="/#contact" data-link>Contact</a>
          <button class="btn-icon nav-btn" id="explore-btn" title="Explore" data-page="explore">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
          </button>
          <div id="auth-nav-area">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </nav>

    <!-- MAIN LAYOUT -->
    <div class="main-layout" id="main-layout">

      <!-- LEFT SIDEBAR -->
      <aside class="sidebar sidebar-left" id="sidebar-left">
        <div class="sidebar-inner" id="sidebar-content">
          <!-- Populated by JS -->
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="content-area" id="content-area">
        <!-- Pages rendered here -->
      </main>

      <!-- RIGHT SIDEBAR -->
      <aside class="sidebar sidebar-right" id="sidebar-right">
        <div class="sidebar-inner" id="sidebar-right-content">
          <!-- Populated by JS -->
        </div>
      </aside>

    </div>

    <!-- MODALS -->
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div id="modal-container"></div>

    <!-- TOAST NOTIFICATIONS -->
    <div class="toast-container" id="toast-container"></div>

  </div>

  <!-- Templates -->
  <template id="tpl-post-card">
    <article class="post-card" data-post-id="">
      <div class="post-header">
        <a class="post-author-link" data-link>
          <div class="avatar avatar-sm"></div>
          <div class="post-author-info">
            <span class="post-author-name"></span>
            <span class="post-author-handle"></span>
          </div>
        </a>
        <div class="post-meta">
          <span class="post-time"></span>
          <div class="post-menu" style="display:none">
            <button class="btn-icon btn-sm post-menu-btn">
              <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
            </button>
            <div class="dropdown post-dropdown">
              <button class="dropdown-item edit-post-btn">Edit</button>
              <button class="dropdown-item danger delete-post-btn">Delete</button>
            </div>
          </div>
        </div>
      </div>
      <div class="post-body">
        <p class="post-content"></p>
        <div class="code-snippet-wrap" style="display:none">
          <div class="code-header">
            <span class="code-lang"></span>
            <button class="btn-copy-code">Copy</button>
          </div>
          <pre class="code-block"><code></code></pre>
        </div>
        <div class="post-tags"></div>
      </div>
      <div class="post-footer">
        <button class="btn-action like-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span class="like-count">0</span>
        </button>
        <button class="btn-action comment-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span class="comment-count">0</span>
        </button>
        <button class="btn-action share-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
      </div>
      <div class="comments-section" style="display:none">
        <div class="comments-list"></div>
        <div class="comment-input-wrap">
          <div class="avatar avatar-xs comment-avatar"></div>
          <div class="comment-input-box">
            <textarea class="comment-input" placeholder="Write a comment..." rows="1"></textarea>
            <button class="btn-primary btn-sm submit-comment-btn">Post</button>
          </div>
        </div>
      </div>
    </article>
  </template>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/pages/home.js"></script>
  <script src="/js/pages/profile.js"></script>
  <script src="/js/pages/explore.js"></script>
  <script src="/js/pages/notifications.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
